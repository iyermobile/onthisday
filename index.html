<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>On This Day - Weather History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.9.0/sql-wasm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sql.js-httpvfs/dist/sqljs-httpvfs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4 text-center">🌤 On This Day - Weather History</h1>

    <!-- Controls -->
    <form id="queryForm" class="row g-3 mb-4">
      <div class="col-md-4">
        <label for="dateInput" class="form-label">Select Date</label>
        <input type="date" id="dateInput" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label for="locationInput" class="form-label">Select Location</label>
        <select id="locationInput" class="form-select" required>
          <option value="">Choose...</option>
          <option value="New York">New York</option>
          <option value="London">London</option>
          <option value="Tokyo">Tokyo</option>
          <option value="Delhi">Delhi</option>
          <!-- Add more cities based on your dataset -->
        </select>
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">Search</button>
      </div>
    </form>

    <!-- Chart -->
    <div class="mb-5">
      <canvas id="weatherChart" height="100"></canvas>
    </div>

    <!-- Results -->
    <div id="results" class="row"></div>
  </div>

  <script>
    let db;
    let chart;

    async function initDB() {
      const worker = new Worker("https://cdn.jsdelivr.net/npm/sql.js-httpvfs/dist/sqljs-httpvfs.worker.js");
      const config = {
        serverMode: "full",
        requestChunkSize: 4096,
        url: "https://bufferhead-code.github.io/onthisday/public/weather.sqlite3" // adjust path if needed
      };
      db = await window.SQLJSHTTPVFS.createDb(config, worker);
    }

    async function queryWeather(month, day, location) {
      const stmt = db.prepare(`
        SELECT year, temperature, precipitation, humidity, wind_speed, conditions
        FROM weather
        WHERE month = ? AND day = ? AND location = ?
        ORDER BY year ASC
      `);
      stmt.bind([month, day, location]);

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = ""; // clear old results

      const years = [];
      const temps = [];

      while (stmt.step()) {
        const row = stmt.getAsObject();
        years.push(row.year);
        temps.push(row.temperature);

        resultsDiv.innerHTML += `
          <div class="col-md-4 mb-3">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">${row.year} - ${location}</h5>
                <p class="card-text">🌡 Temp: ${row.temperature} °C</p>
                <p class="card-text">🌧 Precipitation: ${row.precipitation} mm</p>
                <p class="card-text">💧 Humidity: ${row.humidity}%</p>
                <p class="card-text">🌬 Wind: ${row.wind_speed} km/h</p>
                <p class="card-text">☁ Conditions: ${row.conditions}</p>
              </div>
            </div>
          </div>
        `;
      }
      stmt.free();

      // Update Chart.js
      const ctx = document.getElementById("weatherChart").getContext("2d");
      if (chart) chart.destroy(); // reset old chart
      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: years,
          datasets: [{
            label: `Temperature Trend (${location})`,
            data: temps,
            borderColor: "rgba(75, 192, 192, 1)",
            backgroundColor: "rgba(75, 192, 192, 0.2)",
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: "top" },
            title: { display: true, text: "Temperature Across Years" }
          },
          scales: {
            y: { title: { display: true, text: "Temperature (°C)" } },
            x: { title: { display: true, text: "Year" } }
          }
        }
      });
    }

    document.getElementById("queryForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const date = new Date(document.getElementById("dateInput").value);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const location = document.getElementById("locationInput").value;
      queryWeather(month, day, location);
    });

    initDB();
  </script>
</body>
</html>
